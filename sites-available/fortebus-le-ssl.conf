<VirtualHost *:443>
    ServerName  fortebus.com.br
    ServerAlias www.fortebus.com.br

    # (linhas do certbot — ajuste só se os caminhos de cert forem outros)
    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/fortebus.com.br/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/fortebus.com.br/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    # Permite proxy para backend HTTPS
    SSLProxyEngine On

    # Se ainda der erro de verificação TLS do backend, descomente estas 3 linhas TEMPORARIAMENTE:
    # SSLProxyVerify none
    # SSLProxyCheckPeerName off
    # SSLProxyCheckPeerExpire off

    # Garanta que o WP veja Host incavel.com.br (evita “puxar” para a home)
    ProxyPreserveHost Off
    RequestHeader unset Host
    RequestHeader set   Host "incavel.com.br"
    RequestHeader set   X-Public-Host "fortebus.com.br"
    RequestHeader set   X-Forwarded-Host "%{HTTP_HOST}s"
    RequestHeader set   X-Forwarded-Proto "https"
    RequestHeader set   X-Forwarded-For "%{REMOTE_ADDR}s"

    RewriteEngine On
    RewriteCond %{REQUEST_URI} ^/$
    RewriteRule ^/?$ https://incavel.com.br/representantes/fortebus/ [P,L]

    ProxyPassMatch ^/(.*)$ https://incavel.com.br/$1
    ProxyPassReverse / https://incavel.com.br/

    # Corrige redirects/cookies vindos do backend
    ProxyPassReverseCookieDomain incavel.com.br fortebus.com.br
    Header edit Location "^https?://incavel\.com\.br(/.*)$" "$1"
</VirtualHost>
