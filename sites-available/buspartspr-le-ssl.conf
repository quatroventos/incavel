<VirtualHost *:443>
    ServerName  buspartspr.com.br
    ServerAlias www.buspartspr.com.br

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/buspartspr.com.br/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/buspartspr.com.br/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    SSLProxyEngine On

    ProxyPreserveHost Off
    RequestHeader unset Host
    RequestHeader set   Host "incavel.com.br"
    RequestHeader set   X-Forwarded-Host "%{HTTP_HOST}s"
    RequestHeader set   X-Forwarded-Proto "https"
    RequestHeader set   X-Forwarded-For "%{REMOTE_ADDR}s"

    RewriteEngine On
    RewriteCond %{REQUEST_URI} ^/$
    RewriteRule ^/?$ https://incavel.com.br/representantes/buspartspr/ [P,L]

    ProxyPassMatch ^/(.*)$ https://incavel.com.br/$1
    ProxyPassReverse / https://incavel.com.br/

    Header edit Location "^https?://incavel\.com\.br(/.*)$" "$1"
    ProxyPassReverseCookieDomain incavel.com.br buspartspr.com.br
    Header edit Set-Cookie "(?i)Domain=incavel\.com\.br" "Domain=buspartspr.com.br"

    AddOutputFilterByType SUBSTITUTE text/html text/css application/javascript
    Substitute "s|https://incavel.com.br/|/|ni"
    Substitute "s|http://incavel.com.br/|/|ni"

    Header always set X-Frame-Options SAMEORIGIN
    Header always set X-Content-Type-Options nosniff
    Header always set Referrer-Policy strict-origin-when-cross-origin
</VirtualHost>
