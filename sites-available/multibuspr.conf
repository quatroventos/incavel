<VirtualHost *:80>
    ServerName  multibuspr.com.br
    ServerAlias www.multibuspr.com.br

    # Envie o host do backend para o WP (NÃO preserve o host público)
    ProxyPreserveHost Off
    RequestHeader unset Host
    RequestHeader set   Host "incavel.com.br"
    RequestHeader set   X-Forwarded-Host "%{HTTP_HOST}s"
    RequestHeader set   X-Forwarded-Proto "http"
    RequestHeader set   X-Forwarded-For "%{REMOTE_ADDR}s"

    # 1) Raiz do fortebus -> página alvo no backend
    #    Usamos [P] (proxy) no rewrite para garantir que "/" vá para /representantes/fortebus/
    RewriteEngine On
    RewriteCond %{REQUEST_URI} ^/$
    RewriteRule ^/?$ https://incavel.com.br/representantes/multibus/ [P,L]

    # 2) Demais caminhos (assets/links absolutos) -> raiz do incavel com mesmo path
    ProxyPassMatch ^/(.*)$ https://incavel.com.br/$1
    ProxyPassReverse / https://incavel.com.br/

    # 3) Corrigir redirects absolutos vindos do backend
    #    (Location: https://incavel.com.br/... -> relativa ao domínio público)
    Header edit Location "^https?://incavel\.com\.br(/.*)$" "$1"

    # 4) Corrigir domínio de cookies
    #    Se backend setar Domain=incavel.com.br, reescreve para fortebus.com.br
    ProxyPassReverseCookieDomain incavel.com.br fortebus.com.br
    Header edit Set-Cookie "(?i)Domain=incavel\.com\.br" "Domain=fortebus.com.br"

    # 5) Reescrita de HTML/CSS/JS para links absolutos
    AddOutputFilterByType SUBSTITUTE text/html text/css application/javascript
    Substitute "s|https://incavel.com.br/|/|ni"
    Substitute "s|http://incavel.com.br/|/|ni"

    # Básicos
    Header always set X-Frame-Options SAMEORIGIN
    Header always set X-Content-Type-Options nosniff
    Header always set Referrer-Policy strict-origin-when-cross-origin

    # (opcional) debug fino de proxy quando estiver testando:
    # LogLevel proxy:debug rewrite:trace3
RewriteCond %{SERVER_NAME} =www.fortebus.com.br [OR]
RewriteCond %{SERVER_NAME} =fortebus.com.br
RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>
