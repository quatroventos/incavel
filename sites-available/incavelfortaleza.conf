<VirtualHost *:80>
    ServerName  incavelfortaleza.com.br
    ServerAlias www.incavelfortaleza.com.br

    # Envie o host do backend para o WP (NÃO preserve o host público)
    ProxyPreserveHost Off
    RequestHeader unset Host
    RequestHeader set   Host "incavel.com.br"
    RequestHeader set   X-Forwarded-Host "%{HTTP_HOST}s"
    RequestHeader set   X-Forwarded-Proto "http"
    RequestHeader set   X-Forwarded-For "%{REMOTE_ADDR}s"

    # 1) Raiz -> página do representante Incavel Fortaleza (slug: incavel-fortaleza)
    RewriteEngine On
    RewriteCond %{REQUEST_URI} ^/$
    RewriteRule ^/?$ https://incavel.com.br/representantes/incavel-fortaleza/ [P,L]

    # 2) Demais caminhos -> mesmo path no incavel
    ProxyPassMatch ^/(.*)$ https://incavel.com.br/$1
    ProxyPassReverse / https://incavel.com.br/

    # 3) Corrigir redirects absolutos vindos do backend
    Header edit Location "^https?://incavel\.com\.br(/.*)$" "$1"

    # 4) Corrigir domínio de cookies
    ProxyPassReverseCookieDomain incavel.com.br incavelfortaleza.com.br
    Header edit Set-Cookie "(?i)Domain=incavel\.com\.br" "Domain=incavelfortaleza.com.br"

    # 5) Reescrita de HTML/CSS/JS para links absolutos
    AddOutputFilterByType SUBSTITUTE text/html text/css application/javascript
    Substitute "s|https://incavel.com.br/|/|ni"
    Substitute "s|http://incavel.com.br/|/|ni"

    # Básicos
    Header always set X-Frame-Options SAMEORIGIN
    Header always set X-Content-Type-Options nosniff
    Header always set Referrer-Policy strict-origin-when-cross-origin
</VirtualHost>
