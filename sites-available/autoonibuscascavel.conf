<VirtualHost *:80>
    ServerName  autoonibuscascavel.com.br
    ServerAlias www.autoonibuscascavel.com.br

    ProxyPreserveHost Off
    RequestHeader unset Host
    RequestHeader set   Host "incavel.com.br"
    RequestHeader set   X-Forwarded-Host "%{HTTP_HOST}s"
    RequestHeader set   X-Forwarded-Proto "http"
    RequestHeader set   X-Forwarded-For "%{REMOTE_ADDR}s"

    RewriteEngine On
    RewriteCond %{REQUEST_URI} ^/$
    RewriteRule ^/?$ https://incavel.com.br/representantes/autoonibuscascavel/ [P,L]

    ProxyPassMatch ^/(.*)$ https://incavel.com.br/$1
    ProxyPassReverse / https://incavel.com.br/

    Header edit Location "^https?://incavel\.com\.br(/.*)$" "$1"
    ProxyPassReverseCookieDomain incavel.com.br autoonibuscascavel.com.br
    Header edit Set-Cookie "(?i)Domain=incavel\.com\.br" "Domain=autoonibuscascavel.com.br"
RewriteCond %{SERVER_NAME} =www.autoonibuscascavel.com.br [OR]
RewriteCond %{SERVER_NAME} =autoonibuscascavel.com.br
RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>
